<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>갈릭톤 테트리스</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="game-panel">
        <h1>갈릭톤 테트리스</h1>
        <canvas id="board" width="300" height="600" aria-label="갈릭톤 테트리스 게임 보드"></canvas>
        <div class="mobile-controls" aria-label="모바일 조작 버튼">
          <button type="button" id="btn-left" aria-label="왼쪽 이동">👈</button>
          <button type="button" id="btn-right" aria-label="오른쪽 이동">👉</button>
          <button type="button" id="btn-rotate" aria-label="회전">🔄</button>
          <button type="button" id="btn-down" aria-label="내리기">👇</button>
          <button type="button" id="btn-drop" aria-label="즉시 내리기">💨</button>
          <button type="button" id="btn-pause" aria-label="일시정지">⏯</button>
        </div>
      </section>

      <aside class="info-panel">
        <div class="card">
          <h2>점수</h2>
          <p id="score">0</p>
        </div>
        <div class="card">
          <h2>레벨</h2>
          <p id="level">1</p>
        </div>
        <div class="card">
          <h2>제거한 줄</h2>
          <p id="lines">0</p>
        </div>
        <div class="card">
          <h2>오늘의 미션</h2>
          <p id="mission-title">줄 2개 지우기</p>
          <p id="mission-progress">0 / 2</p>
        </div>
        <div class="card">
          <h2>다음 블록</h2>
          <canvas id="next" width="120" height="120" aria-label="다음 블록 미리보기"></canvas>
        </div>
        <div class="card controls">
          <h2>조작법</h2>
          <ul>
            <li>← / → : 이동</li>
            <li>↓ : 빠르게 내리기</li>
            <li>↑ : 회전</li>
            <li>스페이스 : 즉시 내리기</li>
            <li>P : 일시정지</li>
          </ul>
        </div>
        <button id="restart" type="button">다시 시작</button>
      </aside>
    </main>

    <div id="overlay" class="overlay hidden" role="status" aria-live="polite">
      <div class="overlay-content">
        <p id="overlay-text"></p>
        <button id="resume" class="resume-btn hidden" type="button">▶ 이어하기</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
